# Dual GEN72 — REAL HARDWARE
# ===========================
# Requires 2x Realman GEN72 arms + Realman SDK.
# Set GEN72_LEFT_IP / GEN72_RIGHT_IP to your robots' IPs before running.
#
# Architecture: planner → real_robot (direct, no trajectory_executor)
# This matches the proven single-arm pattern in gen72_real.yml.
#
# Usage:
#   cd examples/dual_gen72
#   dora up
#   dora start dataflows/dual_gen72_real.yml

nodes:
  # ===========================================
  # Dual GEN72 Real Robot Control
  # ===========================================
  - id: real_robot
    path: ../dual_gen72_demo/nodes/dual_gen72_real_robot_node.py
    inputs:
      tick: dora/timer/millis/200
      control_input: planner/trajectory
    outputs:
      - joint_positions
      - execution_status
    env:
      GEN72_LEFT_IP: "192.168.1.17"
      GEN72_RIGHT_IP: "192.168.1.18"

  # ===========================================
  # Planning Scene
  # ===========================================
  - id: planning_scene
    path: ../dual_gen72_demo/nodes/planning_scene.py
    inputs:
      robot_state: real_robot/joint_positions
      scene_command: user_node/scene_command
      tick: dora/timer/millis/5000
    outputs:
      - scene_update
      - command_result
    env:
      ROBOT_CONFIG_MODULE: "dual_gen72_demo.config.dual_gen72"

  # ===========================================
  # OMPL Motion Planner
  # ===========================================
  - id: planner
    path: ../dual_gen72_demo/nodes/planner.py
    inputs:
      plan_request: user_node/plan_request
      scene_update: planning_scene/scene_update
    outputs:
      - trajectory
      - plan_status
    env:
      ROBOT_CONFIG_MODULE: "dual_gen72_demo.config.dual_gen72"

  # ===========================================
  # IK Solver
  # ===========================================
  - id: ik_solver
    path: ../dual_gen72_demo/nodes/ik_solver.py
    inputs:
      ik_request: user_node/ik_request
    outputs:
      - ik_solution
      - ik_status
    env:
      ROBOT_CONFIG_MODULE: "dual_gen72_demo.config.dual_gen72"

  # ===========================================
  # User Demo Node
  # ===========================================
  - id: user_node
    path: ../dual_gen72_demo/nodes/dual_arm_real_demo.py
    env:
      ROBOT_CONFIG_MODULE: "dual_gen72_demo.config.dual_gen72"
    inputs:
      joint_positions: real_robot/joint_positions
      plan_status: planner/plan_status
      trajectory: planner/trajectory
      execution_status: real_robot/execution_status
      ik_solution: ik_solver/ik_solution
      ik_status: ik_solver/ik_status
      command_result: planning_scene/command_result
    outputs:
      - plan_request
      - ik_request
      - scene_command
